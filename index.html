<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vedat</title>
  <meta name="description" content="Vedat's personal website">
  <meta property="og:title" content="vedat">
  <meta property="og:description" content="Vedat's personal website">
  <meta property="og:type" content="website">
  <link rel="icon" href="favicon.svg">
  <script>const t=localStorage.getItem('theme');if(t==='light'||(!t&&matchMedia('(prefers-color-scheme:light)').matches))document.documentElement.classList.add('light')</script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0a;
      --text: #e0e0e0;
      --dim: #606060;
      --accent: #00aa66;
    }

    :root.light {
      --bg: #f4f1eb;
      --text: #1a1a1a;
      --dim: #737373;
      --accent: #16803c;
    }

    body {
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
      padding: 3rem 2rem;
      transition: background 0.3s, color 0.3s;
    }

    main {
      max-width: 80ch;
      width: 100%;
      margin: 0 auto;
    }

    header {
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 1;
      transition: background 0.3s;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }

    .prompt { color: var(--accent); }

    .toggle {
      background: none;
      border: 1px solid var(--dim);
      color: var(--dim);
      padding: 0.25rem 0.5rem;
      font-family: inherit;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .toggle::after { content: 'light'; }
    :root.light .toggle::after { content: 'dark'; }

    .toggle:hover {
      border-color: var(--text);
      color: var(--text);
    }

    h1 {
      font-size: 1rem;
      font-weight: normal;
      margin-bottom: 1.5rem;
    }

    h1 span { color: var(--dim); }

    p {
      color: var(--dim);
      margin-bottom: 2rem;
    }

    nav {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }

    nav a {
      color: var(--text);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    nav a:hover { color: var(--accent); }

    nav a::before {
      content: '→';
      color: var(--dim);
    }

    nav a:hover::before { color: var(--accent); }

    .links {
      display: flex;
      gap: 1.5rem;
      font-size: 0.85rem;
    }

    .links a {
      color: var(--dim);
      text-decoration: none;
    }

    .links a:hover { color: var(--accent); }

  </style>
</head>
<body>
  <main>
    <header>
      <div class="prompt">~/vedat</div>
      <button class="toggle" onclick="toggleTheme()"></button>
    </header>

    <h1>software engineer</h1>

    <p>I like thinking through hard problems. It also pays the bills.</p>

    <nav>
      <a href="writing.html">writing</a>
    </nav>

    <div class="links">
      <a href="https://github.com/badayvedat" target="_blank">github</a>
      <a href="https://linkedin.com/in/badayvedat" target="_blank">linkedin</a>
      <a href="https://twitter.com/shizoidcat" target="_blank">twitter</a>
    </div>
  </main>

  <script>
    const root = document.documentElement;

    function setTheme(theme) {
      if (theme === 'light') {
        root.classList.add('light');
      } else {
        root.classList.remove('light');
      }
      localStorage.setItem('theme', theme);
    }

    function toggleTheme() {
      const isLight = root.classList.contains('light');
      setTheme(isLight ? 'dark' : 'light');
    }

  </script>
</body>
</html>
